name: Publish to PyPI

# Actions are pinned to full SHAs to prevent supply chain attacks (tag hijacking).
# TODO(Later): Consider using Dependabot to automate SHA updates, or switch to tags
# if the maintenance burden outweighs the security benefit for this project.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: PyPI
      url: https://pypi.org/p/project-lighthouse-anonymize
    permissions:
      attestations: write
      contents: read
      id-token: write

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      with:
        fetch-depth: 0  # For hatch-vcs

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: |
        pip install build hatch hatch-vcs

    - name: Build package
      run: python -m build

    - name: Verify package installation
      run: |
        pip install dist/*.whl
        pip check

    - name: Attest build provenance
      uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32  # v4.1.0
      with:
        subject-path: dist/*.whl

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e  # v1.13.0
      with:
        print-hash: true
