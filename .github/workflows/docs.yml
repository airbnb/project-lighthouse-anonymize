name: Deploy Docs

# Actions are pinned to full SHAs to prevent supply chain attacks (tag hijacking).
# TODO(Later): Consider using Dependabot to automate SHA updates, or switch to tags
# if the maintenance burden outweighs the security benefit for this project.

on:
  push:
    branches: ["main"]

# Allow only one concurrent deployment, cancelling in-progress runs
concurrency:
  group: "pages"
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      with:
        fetch-depth: 0  # For hatch-vcs

    - name: Set up Python 3.12
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
      with:
        python-version: "3.12"
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install hatch hatch-vcs
        pip install -e ".[docs]"

    - name: Configure Pages
      uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b  # v5

    - name: Build docs
      run: sphinx-build -b html docs docs/_build/html -W --keep-going

    - name: Upload Pages artifact
      uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa  # v3
      with:
        path: docs/_build/html

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e  # v4
